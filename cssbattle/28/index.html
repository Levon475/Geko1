<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .container {
        width: 400px;
        height: 300px;
        background-color: #1a4341;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(2, 1fr);
        place-items: center;
        padding: 90px 70px;
        gap: 20px 20px;
        
      }
      .klor1 {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background-color: #998235;
      }
      .klor2 {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background-color: #F3AC3C;
        border-bottom-left-radius: 0px ;
        border-bottom-right-radius: 0px ;
      }
      .klor3 {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background-color: #998235;
         border-bottom-left-radius: 0px ;
        border-bottom-right-radius: 0px ;
      }
      .klor4 {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background-color: #F3AC3C;
      }
      .klor5 {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background-color: #F3AC3C;
         border-top-left-radius: 0px ;
        border-top-right-radius: 0px ;
      }
      .klor6 {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background-color: #998235;
      }
      .klor7 {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background-color: #F3AC3C;
      }
      .klor8 {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background-color: #998235;
        border-top-left-radius: 0px ;
        border-top-right-radius: 0px ;
      }
    </style>
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <div class="klor1"></div>
      <div class="klor2"></div>
      <div class="klor3"></div>
      <div class="klor4"></div>
      <div class="klor5"></div>
      <div class="klor6"></div>
      <div class="klor7"></div>
      <div class="klor8"></div>
    </div>
  </body>
</html>
