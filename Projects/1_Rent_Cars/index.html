<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="main.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="header_wrap">
          <div class="header_logo">
            <a href="#"><img src="./image1/Frame.svg" alt="logo" /></a>
          </div>
          <nav class="header_nav">
            <ul class="header_navlist">
              <li class="header_navitem">
                <a href="#" class="header_navlink">About</a>
              </li>
              <li class="header_navitem">
                <a href="#" class="header_navlink">Car</a>
              </li>
              <li class="header_navitem">
                <a href="#" class="header_navlink">Become Partner</a>
              </li>
              <li class="header_navitem">
                <a href="#" class="header_navlink">Terms & Conditions</a>
              </li>
              <li class="header_navitem">
                <a href="#" class="header_navlink">Contact Us</a>
              </li>
            </ul>
          </nav>
        </div>
        <div class="hero">
          <div class="hero_text">
            <div class="text1">We Have Prepared a Car For Your Trip</div>
            <div class="text2">
              We have many types of cars that are ready for you to travel
              anywhere and anytime.
            </div>
            <div class="buttons">
              <a href="#" class="text3">Get In Touch</a>
              <a href="#" class="text4">Our Car</a>
            </div>
          </div>
          <div class="background_image"></div>
          <div class="scroll"><i class="fa-solid fa-angles-down"></i></div>
        </div>
        <div class="logos">
          <div class="logo">
            <img src="image1/BMW.png" alt="bmw_logo">
          </div>
          <div class="logo">
            <img src="image1/Lexus.png" alt="lexus_logo">
          </div>
          <div class="logo">
            <img src="image1/Marcedes.png" alt="mercedes_logo">
          </div>
          <div class="logo">
            <img src="image1/Honda.png" alt="honda_logo">
          </div>
          <div class="logo">
            <img src="image1/Hyundai.png" alt="hyundai_logo">
          </div>
          <div class="logo">
            <img src="image1/Nissan.png" alt="nissan_logo">
          </div>
          <div class="logo">
            <img src="image1/Toyota.png" alt="Toyota_logo">
          </div>
          <div class="logo">
            <img src="image1/Kia.png" alt="kia_logo">
          </div>

        </div>
      </div>
    </header>
  </body>
</html>
