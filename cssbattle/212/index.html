<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      body {
        height: 100vh;
      }
      .container {
        aspect-ratio: 4 / 3;
        width: 80%;
        background: #f4ba63;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .box {
        width: 75%;
        aspect-ratio: 89 / 55;
        display: grid;
        grid-template-columns: 21fr 5fr 8fr 55fr;
        grid-template-rows: 13fr 8fr 34fr;
      }

      .b1 {
        background: #080;
        grid-area: 1 / 4 / -1 / -1;
        border-bottom-right-radius: 100%;
      }

      .b2 {
        background: #db2323;
        grid-area: 3 / 1 / -1 / 4;
        border-bottom-left-radius: 100%;
      }

      .b3 {
        background: #e06c07;
        grid-area: 1 / 1 / 3 / 2;
        border-top-left-radius: 100%;
      }

      .b4 {
        background: #e06c07;
        grid-area: 1 / 2 / 2 / 4;
        border-top-right-radius: 100%;
      }

      .b5 {
        background: #000;
        grid-area: 2 / 3 / 3 / 4;
        border-bottom-right-radius: 100%;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">
        <div class="b1"></div>
        <div class="b2"></div>
        <div class="b3"></div>
        <div class="b4"></div>
        <div class="b5"></div>
      </div>
    </div>
  </body>
</html>
