<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
    .container{
        width: 400px;
        height: 300px;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #FFED99;
    }
    .box{
        display: grid;
        grid-template-columns: 21fr 5fr 8fr 55fr ;
        grid-template-rows: 13fr 8fr 34fr;
        padding: 55px 60px;
        aspect-ratio: 89/55;
    }
    .f1{
        width: 180px;
        height: 180px;
        background-color: #3F8627;
        grid-area: 1/4/4/-1;
        border-bottom-right-radius: 100%;
    }
    .f2{
        background-color: #9F3333;
        grid-area: 3/1/-1/4;
        border-bottom-left-radius: 100%;
    }
    .f3{
        background-color: #F48B26;
        grid-area: 1/1/3/2;
        border-top-left-radius: 100%;
    }
      .f4{
        background-color: #F48B26;
        grid-area: 1/2/2/4;
        border-top-right-radius: 100%;
    }
    .f5{
        background-color: black;
        grid-area: 2/3/3/4;
        border-bottom-right-radius: 100%;
    }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
        <div class="f1"></div>
        <div class="f2"></div>
        <div class="f3"></div>
        <div class="f4"></div>
        <div class="f5"></div>
        </div>
    </div>
</body>
</html>
