<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .container {
        width: 400px;
        height: 300px;
        background-color: #fdffe9;
        position: relative;
      }
      .g1 {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background-color: #d95362;
        position: absolute;
        transform: translate(0px, -60px);
      }
      .g2 {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background-color: #2d3464;
        position: absolute;
        transform: translate(140px, -70px);
      }
      .g3 {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background-color: #d95362;
        position: absolute;
        transform: translate(280px, -60px);
      }
      .g4 {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background-color: #2d3464;
        position: absolute;
        transform: translate(-15px, 80px);
      }
      .g5 {
        width: 150px;
        height: 150px;
        background-color: #d95362;
        position: absolute;
        transform: translate(125px, 70px);
      }
      .g6 {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background-color: #2d3464;
        position: absolute;
        transform: translate(275px, 80px);
      }
      .g7 {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background-color: #d95362;
        position: absolute;
        transform: translate(0px, 220px);
      }
      .g8 {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background-color: #2d3464;
        position: absolute;
        transform: translate(140px, 220px);
      }
      .g9 {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background-color: #d95362;
        position: absolute;
        transform: translate(280px, 220px);
      }
      .g10{
        width: 300px;
        height: 300px;
        border: 20px solid #FDFFE9;
        position: absolute;
        transform: translate(50px);

      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="g1"></div>
      <div class="g2"></div>
      <div class="g3"></div>
      <div class="g4"></div>
      <div class="g5"></div>
      <div class="g6"></div>
      <div class="g7"></div>
      <div class="g8"></div>
      <div class="g9"></div>
      <div class="g10"></div>
    </div>
  </body>
</html>
